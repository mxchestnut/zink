# Build and publish the portfolio to GitHub Pages (free hosting).
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    # claude/sharp-brown-ufenk5 was the repo's first (default) branch, so the
    # auto-created github-pages environment only allows deploys from it. Keep
    # main here too for when the default branch moves over.
    branches: [main, claude/sharp-brown-ufenk5]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # served from https://<user>.github.io/zink/
          VITE_BASE: /zink/
          # Ghost journal — read from Actions Variables or Secrets, whichever
          # tab the values were added under. The Content API key is read-only
          # and ships in the client bundle anyway.
          VITE_GHOST_URL: ${{ vars.VITE_GHOST_URL || secrets.VITE_GHOST_URL }}
          VITE_GHOST_KEY: ${{ vars.VITE_GHOST_KEY || secrets.VITE_GHOST_KEY }}
          VITE_GHOST_TAG: ${{ vars.VITE_GHOST_TAG || secrets.VITE_GHOST_TAG }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
